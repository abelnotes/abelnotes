[package]
name = "onenote_parser"
readme = "../../README.md"
description = "A parser for Microsoft OneNote® files"
keywords = ["onenote", "parser"]
categories = ["parser-implementations"]

version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["native-fs"]
backtrace = []
native-fs = []
onepkg = ["dep:cab"]

[dependencies]
bytes = "1.11"
encoding_rs = "0.8"
enum-primitive-derive = "0.3"
itertools = "0.14"
log = "0.4"
num-traits = "0.2"
sanitize-filename = "0.6"
thiserror = "2.0"
time = { version = "0.3", features = ["macros"] }
uuid = "1.19"
widestring = "1.2"

onenote_parser-macros = { workspace = true }
cab = { version = "0.6", optional = true }
lru = "0.18"
typed-path = "0.12.3"

[dev-dependencies]
bytes = "1.11"
criterion = { version = "0.7", default-features = false, features = ["cargo_bench_support"] }
insta = "1.45"
tempfile = "3.15"
yare = "3.0.0"

[lib]
crate-type = ["cdylib", "lib"]

[[bench]]
name = "parse"
harness = false
