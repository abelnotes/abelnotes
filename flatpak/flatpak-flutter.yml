## AbelNotes — flatpak-flutter TEMPLATE (source of truth, maintained by hand).
##
## This is NOT the manifest Flathub builds. Flathub build servers have no
## network, so run flatpak-flutter on THIS file to produce the offline
## manifest (app.abelnotes.notes.yml) + pinned source lists (generated/).
## See README.md. Rerun only when dependencies or the Flutter version change.
##
##   flatpak-flutter.py --app-module abelnotes flatpak-flutter.yml
##
app-id: app.abelnotes.notes
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: abelnotes

finish-args:
  - --share=network            # Nextcloud / WebDAV sync
  - --share=ipc                # X11 fallback
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri               # OpenGL for the Flutter GTK embedder
  - --talk-name=org.freedesktop.secrets   # flutter_secure_storage (libsecret)
  # file_picker shells out to zenity (bundled below), which runs inside the
  # sandbox and has no portal, so it needs real filesystem access to
  # import/export notes and PDFs from anywhere the user keeps them.
  - --filesystem=home
  ## Stylus pressure evdev fallback — OFF by design (GDK-axis path works in
  ## sandbox and is what the pen-as-mouse fix relies on). See README.md.
  #- --device=input

modules:
  # flutter_secure_storage_linux links libsecret; the freedesktop SDK ships
  # no libsecret-1 dev files, so build it from source before the app.
  - name: libsecret
    buildsystem: meson
    config-opts:
      - --libdir=lib          # x86_64 meson defaults to lib64, off PKG_CONFIG_PATH
      - -Dmanpage=false
      - -Dgtk_doc=false
      - -Dintrospection=false
      - -Dvapi=false
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.7.tar.xz
        sha256: 6b452e4750590a2b5617adc40026f28d2f4903de15f1250e1d1c40bfd68ed55e

  # file_picker (Linux) invokes `zenity` via Process.run for open/save
  # dialogs; it is absent from the runtime. GTK3 build, no libadwaita.
  - name: zenity
    buildsystem: simple
    build-commands:
      - meson setup _build --prefix=/app --libdir=lib -Dwebkitgtk=false
      - ninja -C _build
      # zenity's meson runs gtk-update-icon-cache -f on /app/share/icons/hicolor,
      # which errors without an index.theme there — seed the SDK's before install.
      - install -Dm644 /usr/share/icons/hicolor/index.theme /app/share/icons/hicolor/index.theme
      - ninja -C _build install
    cleanup:
      - /share
    sources:
      - type: archive
        url: https://download.gnome.org/sources/zenity/3.44/zenity-3.44.4.tar.xz
        sha256: f1a4c958f4d4103f644457e440fd4bd86cf8b0502e9ace06002c98e36cd84a18

  - name: abelnotes
    buildsystem: simple
    build-options:
      arch:
        x86_64:
          env:
            BUNDLE_PATH: build/linux/x64/release/bundle
        aarch64:
          env:
            BUNDLE_PATH: build/linux/arm64/release/bundle
      append-path: /usr/lib/sdk/llvm20/bin:/run/build/abelnotes/flutter/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      env:
        PUB_CACHE: /run/build/abelnotes/.pub-cache
        # flutter_secure_storage_linux bundles an old nlohmann/json.hpp that
        # trips clang (llvm20) -Werror on -Wdeprecated-literal-operator.
        CXXFLAGS: -Wno-error=deprecated-literal-operator -Wno-deprecated-literal-operator
    build-commands:
      - flutter config --enable-native-assets
      - flutter build linux --release --no-pub
      - mkdir -p /app/abelnotes
      - cp -r $BUNDLE_PATH/. /app/abelnotes/
      - mkdir -p /app/bin
      - ln -s /app/abelnotes/abelnotes /app/bin/abelnotes
      - install -Dm644 flatpak/app.abelnotes.notes.desktop /app/share/applications/app.abelnotes.notes.desktop
      - install -Dm644 flatpak/app.abelnotes.notes.metainfo.xml /app/share/metainfo/app.abelnotes.notes.metainfo.xml
      - install -Dm644 web/icons/Icon-512.png /app/share/icons/hicolor/512x512/apps/app.abelnotes.notes.png
    sources:
      - type: git
        url: https://github.com/abelnotes/abelnotes.git
        tag: v0.37.2
      - type: git
        url: https://github.com/flutter/flutter.git
        tag: '3.44.0'
        dest: flutter

  # pen_monitor_service.dart shells out to xrandr + xinput for the "restrict
  # pen to one monitor" feature (X11-only). Absent from the runtime; works
  # under X11/Xwayland via --socket=fallback-x11.
  - name: xrandr
    buildsystem: autotools
    cleanup:
      - /share
    sources:
      - type: archive
        url: https://www.x.org/releases/individual/app/xrandr-1.5.2.tar.xz
        sha256: c8bee4790d9058bacc4b6246456c58021db58a87ddda1a9d0139bf5f18f1f240

  - name: xinput
    buildsystem: autotools
    cleanup:
      - /share
    sources:
      - type: archive
        url: https://www.x.org/releases/individual/app/xinput-1.6.4.tar.xz
        sha256: ad04d00d656884d133110eeddc34e9c69e626ebebbbab04dc95791c2907057c8
